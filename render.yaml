# Render Blueprint — External backend deployment
# Docs: https://render.com/docs/blueprint-spec
# Deploy: connect GitHub repo → Render detects this file automatically

services:
  - type: web
    name: nextai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: PG_DSN
        sync: false   # Set manually in Render dashboard — paste Neon connection string
      - key: DATABASE_URL
        sync: false   # Same as PG_DSN
      - key: ANTHROPIC_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: KAGGLE_USERNAME
        sync: false   # Optional — omit to use seed CSVs
      - key: KAGGLE_KEY
        sync: false   # Optional — omit to use seed CSVs
    autoDeploy: true
